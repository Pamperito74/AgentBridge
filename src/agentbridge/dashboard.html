<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentBridge</title>
<style>
  :root {
    --bg: #0d0d14;
    --bg-card: #13131e;
    --bg-hover: #1a1a28;
    --bg-input: #1e1e2e;
    --border: #252535;
    --border-light: #2e2e42;
    --fg: #e2e2f0;
    --fg-dim: #6b6b85;
    --fg-mid: #9898b0;
    --accent: #7c5cfc;
    --accent-dim: #5a3fd4;
    --accent-glow: rgba(124,92,252,0.15);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --yellow: #fbbf24;
    --yellow-dim: rgba(251,191,36,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --sidebar: 240px;
    --compose-h: 110px;
    --agents-h: 200px;
  }
  :root[data-theme="light"] {
    --bg: #f4f4f8;
    --bg-card: #ffffff;
    --bg-hover: #f0f0f6;
    --bg-input: #f7f7fb;
    --border: #e2e2ec;
    --border-light: #d0d0de;
    --fg: #1a1a2e;
    --fg-dim: #8888a8;
    --fg-mid: #5555778;
    --accent: #6c4ff0;
    --accent-dim: #4f34c8;
    --accent-glow: rgba(108,79,240,0.10);
    --green: #10b981;
    --green-dim: rgba(16,185,129,0.10);
    --yellow: #d97706;
    --yellow-dim: rgba(217,119,6,0.10);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.10);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.10);
  }

  /* Theme toggle */
  .theme-btn {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--fg-mid);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    transition: background 0.15s, color 0.15s;
  }
  .theme-btn:hover { background: var(--bg-hover); color: var(--fg); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: grid;
    grid-template-columns: var(--sidebar) 4px 1fr;
    grid-template-rows: 52px 1fr;
    height: 100vh;
    font-size: 14px;
    user-select: none;
  }
  body.resizing { cursor: col-resize; }
  body.resizing-v { cursor: row-resize; }

  /* ── Resize handles ── */
  .rz-sidebar {
    grid-column: 2; grid-row: 2;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.15s;
    z-index: 10;
  }
  .rz-sidebar:hover, .rz-sidebar.active { background: var(--accent); }

  .rz-compose {
    height: 4px;
    background: var(--border);
    cursor: row-resize;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .rz-compose:hover, .rz-compose.active { background: var(--accent); }

  .rz-sidebar-split {
    height: 4px;
    background: var(--border);
    cursor: row-resize;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .rz-sidebar-split:hover, .rz-sidebar-split.active { background: var(--accent); }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    grid-row: 1;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    z-index: 10;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: breathe 3s ease-in-out infinite;
  }
  .logo-dot.disconnected { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
  @keyframes breathe {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
    50% { opacity: 0.6; box-shadow: 0 0 12px var(--green); }
  }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .agent-count {
    font-size: 12px;
    color: var(--fg-dim);
    background: var(--bg-input);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 20px;
  }
  .agent-count span { color: var(--green); font-weight: 600; }
  .identity {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--fg-mid);
  }
  .identity input {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--fg);
    padding: 4px 8px;
    font-size: 12px;
    font-family: inherit;
    width: 110px;
    outline: none;
  }
  .identity input:focus { border-color: var(--accent); }
  .conn-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(52,211,153,0.2);
  }
  .conn-badge.disconnected { background: var(--red-dim); color: var(--red); border-color: rgba(248,113,113,0.2); }

  /* ── Sidebar ── */
  aside {
    grid-column: 1; grid-row: 2;
    background: var(--bg-card);
    border-right: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    padding: 14px 0 8px;
    flex-shrink: 0;
  }
  .sidebar-section:not(:first-child) {
    border-top: 1px solid var(--border);
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--fg-dim);
    padding: 0 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-label .count {
    background: var(--bg-hover);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--fg-mid);
    font-weight: 500;
    letter-spacing: 0;
    text-transform: none;
  }
  .agent-list { overflow-y: auto; height: var(--agents-h); max-height: var(--agents-h); }
  .thread-list { overflow-y: auto; }

  /* Agents */
  .agent-item {
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .agent-item:hover { background: var(--bg-hover); }
  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
  }
  .avatar-badge {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 9px; height: 9px;
    border-radius: 50%;
    border: 2px solid var(--bg-card);
  }
  .avatar-badge.online { background: var(--green); }
  .avatar-badge.busy   { background: var(--yellow); }
  .avatar-badge.idle   { background: var(--fg-dim); }
  .agent-info { overflow: hidden; flex: 1; min-width: 0; }
  .agent-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-sub  { font-size: 11px; color: var(--fg-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .agent-cap  { font-size: 10px; color: var(--accent); background: var(--accent-glow); padding: 1px 5px; border-radius: 3px; margin-top: 2px; display: inline-block; }
  .kick-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--fg-dim);
    font-size: 12px;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .agent-item:hover .kick-btn { opacity: 1; }
  .kick-btn:hover { background: var(--red-dim); color: var(--red); }

  /* Threads */
  .thread-item {
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    font-size: 13px;
    border-radius: 0;
    transition: background 0.1s;
    color: var(--fg-mid);
  }
  .thread-item:hover { background: var(--bg-hover); color: var(--fg); }
  .thread-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 500; }
  .thread-hash { color: var(--fg-dim); font-size: 12px; font-weight: 600; }
  .thread-item.active .thread-hash { color: var(--accent); }
  .thread-badge {
    margin-left: auto;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  /* ── Main ── */
  main {
    grid-column: 3; grid-row: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* Thread header bar */
  .thread-header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .thread-header-name {
    font-weight: 600;
    font-size: 14px;
  }
  .thread-header-meta {
    font-size: 12px;
    color: var(--fg-dim);
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .msg-group {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .msg-group:first-child { margin-top: 0; }
  .msg-group .avatar { align-self: flex-start; margin-top: 2px; }
  .msg-group-body { flex: 1; min-width: 0; }
  .msg-group-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .msg-sender { font-size: 13px; font-weight: 600; }
  .msg-to { font-size: 12px; color: var(--blue); }
  .msg-ts { font-size: 11px; color: var(--fg-dim); }
  .msg-thread-tag { font-size: 11px; color: var(--fg-dim); background: var(--bg-input); padding: 1px 5px; border-radius: 3px; }

  .msg-bubble {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
    margin-bottom: 2px;
    position: relative;
  }
  .msg-bubble.request { border-left: 3px solid var(--blue); background: color-mix(in srgb, var(--bg-card) 95%, var(--blue)); }
  .msg-bubble.alert   { border-left: 3px solid var(--red);  background: color-mix(in srgb, var(--bg-card) 95%, var(--red)); }
  .msg-bubble.status  { border-left: 3px solid var(--yellow); background: color-mix(in srgb, var(--bg-card) 95%, var(--yellow)); }
  .msg-bubble.response { border-left: 3px solid var(--green); background: color-mix(in srgb, var(--bg-card) 95%, var(--green)); }

  .type-pill {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .type-pill.request  { background: var(--blue-dim);   color: var(--blue); }
  .type-pill.alert    { background: var(--red-dim);    color: var(--red); }
  .type-pill.status   { background: var(--yellow-dim); color: var(--yellow); }
  .type-pill.response { background: var(--green-dim);  color: var(--green); }

  .mention { color: var(--accent); font-weight: 500; }
  .artifacts { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .artifact {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    color: var(--fg-mid);
  }

  .system-msg {
    text-align: center;
    color: var(--fg-dim);
    font-size: 11px;
    padding: 6px;
    font-style: italic;
    margin: 4px 0;
  }
  .system-msg::before, .system-msg::after {
    content: '─────';
    margin: 0 6px;
    opacity: 0.3;
  }
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--fg-dim);
  }
  .empty-state .icon { font-size: 32px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  /* ── Compose ── */
  .compose {
    padding: 12px 16px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: var(--compose-h);
    flex-shrink: 0;
    overflow: hidden;
  }
  .compose-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .compose-controls label {
    font-size: 11px;
    color: var(--fg-dim);
    margin-right: 2px;
  }
  .compose-controls select {
    font-family: inherit;
    font-size: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--fg);
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .compose-controls select:focus { border-color: var(--accent); }
  .compose-controls select#recipient-select { min-width: 110px; }
  .compose-controls select#thread-select    { min-width: 90px; }
  .compose-controls select#type-select      { min-width: 80px; }
  .compose-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .compose-input-wrap { flex: 1; position: relative; }
  .compose-input-wrap textarea {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--fg);
    padding: 10px 12px;
    outline: none;
    resize: none;
    line-height: 1.5;
    min-height: 42px;
    max-height: 120px;
    transition: border-color 0.15s;
  }
  .compose-input-wrap textarea:focus { border-color: var(--accent); }
  .compose-input-wrap textarea::placeholder { color: var(--fg-dim); }
  .send-btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    height: 42px;
  }
  .send-btn:hover { background: var(--accent-dim); }
  .send-btn:active { transform: scale(0.97); }

  /* Mention popup */
  .mention-popup {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    box-shadow: 0 -8px 24px rgba(0,0,0,0.5);
    max-height: 200px;
    overflow-y: auto;
    z-index: 20;
    display: none;
    min-width: 220px;
  }
  .mention-popup.visible { display: block; }
  .mention-option {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
  }
  .mention-option:hover, .mention-option.active { background: var(--bg-hover); }
  .mo-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .mo-name { font-weight: 500; }
  .mo-role { font-size: 11px; color: var(--fg-dim); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot" id="logo-dot"></div>
    AgentBridge
  </div>
  <div class="header-right">
    <div class="agent-count">
      <span id="agent-count-num">0</span> online
    </div>
    <div class="identity">
      <span>You:</span>
      <input type="text" id="sender-input" value="dashboard" placeholder="Your name">
    </div>
    <button class="theme-btn" id="theme-btn" title="Toggle theme">🌙</button>
    <div class="conn-badge" id="conn-badge">Connecting</div>
  </div>
</header>

<aside>
  <div class="sidebar-section">
    <div class="sidebar-label">
      Agents
      <span class="count" id="agent-sidebar-count">0</span>
    </div>
    <div class="agent-list" id="agent-list">
      <div style="padding: 8px 14px; font-size: 12px; color: var(--fg-dim);">No agents online</div>
    </div>
  </div>
  <div class="rz-sidebar-split" id="rz-sidebar-split"></div>
  <div class="sidebar-section" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">
    <div class="sidebar-label">Threads</div>
    <div class="thread-list" id="thread-list" style="flex:1; overflow-y: auto; max-height: none;"></div>
  </div>
</aside>

<div class="rz-sidebar" id="rz-sidebar"></div>

<main>
  <div class="thread-header">
    <div class="thread-header-name" id="thread-header-name">#all threads</div>
    <div class="thread-header-meta" id="thread-header-meta"></div>
  </div>
  <div class="messages" id="messages">
    <div class="empty-state">
      <div class="icon">◎</div>
      <p>No messages yet. Agents will appear here when they communicate.</p>
    </div>
  </div>
  <div class="rz-compose" id="rz-compose"></div>
  <div class="compose">
    <div class="compose-controls">
      <label>To</label>
      <select id="recipient-select"><option value="">Everyone</option></select>
      <label style="margin-left:4px">#</label>
      <select id="thread-select"><option value="general">general</option></select>
      <label style="margin-left:4px">Type</label>
      <select id="type-select">
        <option value="chat">chat</option>
        <option value="request">request</option>
        <option value="status">status</option>
        <option value="alert">alert</option>
      </select>
    </div>
    <div class="compose-row">
      <div class="compose-input-wrap">
        <textarea id="msg-input" placeholder="Type a message… (@ to mention, Enter to send, Shift+Enter for newline)" rows="1"></textarea>
        <div class="mention-popup" id="mention-popup"></div>
      </div>
      <button class="send-btn" id="send-btn">Send</button>
    </div>
  </div>
</main>

<script>
const API = window.location.origin;
const TOKEN = new URLSearchParams(window.location.search).get('token') || '';
let currentThread = null;
let agents = [];
let threads = [];
// Track rendered message ids to avoid duplicate rendering on SSE
let renderedIds = new Set();
// Group tracking for consecutive same-sender messages
let lastGroupSender = null;
let lastGroupRecipient = null;

// ── Palette for agent avatars
const PALETTE = ['#7c5cfc','#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#38bdf8','#4ade80','#fb923c','#e879f9'];
function agentColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}
function initials(name) {
  const parts = name.split(/[-_\s]/);
  return parts.length > 1
    ? (parts[0][0] + parts[1][0]).toUpperCase()
    : name.substring(0, 2).toUpperCase();
}

// ── Helpers
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function relTime(ts) {
  const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (diff < 10)  return 'just now';
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
function absTime(ts) {
  return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

// ── Fetch
async function api(path, opts) {
  const options = opts ? {...opts} : {};
  const headers = { ...(options.headers || {}) };
  if (TOKEN) headers['X-AgentBridge-Token'] = TOKEN;
  options.headers = headers;
  const r = await fetch(API + path, options);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Render sidebar agents
function renderAgents() {
  const el = document.getElementById('agent-list');
  document.getElementById('agent-sidebar-count').textContent = agents.length;
  document.getElementById('agent-count-num').textContent = agents.length;
  if (!agents.length) {
    el.innerHTML = '<div style="padding: 8px 14px; font-size: 12px; color: var(--fg-dim);">No agents online</div>';
    updateRecipientSelect();
    return;
  }
  el.innerHTML = agents.map(a => {
    const color = agentColor(a.name);
    const caps = (a.capabilities || []).slice(0, 2).join(', ');
    return `<div class="agent-item" data-name="${esc(a.name)}">
      <div class="avatar" style="background:${color}22; color:${color}">
        ${esc(initials(a.name))}
        <div class="avatar-badge ${a.status || 'online'}"></div>
      </div>
      <div class="agent-info">
        <div class="agent-name">${esc(a.name)}</div>
        <div class="agent-sub">${a.working_on ? esc(a.working_on) : esc(a.role || '')}</div>
        ${caps ? `<div class="agent-cap">${esc(caps)}</div>` : ''}
      </div>
      <button class="kick-btn" data-name="${esc(a.name)}" title="Kick agent">✕</button>
    </div>`;
  }).join('');
  el.querySelectorAll('.agent-item').forEach(item => {
    item.onclick = (e) => {
      if (e.target.closest('.kick-btn')) return;
      document.getElementById('recipient-select').value = item.dataset.name;
      document.getElementById('msg-input').focus();
    };
  });
  el.querySelectorAll('.kick-btn').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const name = btn.dataset.name;
      if (!confirm(`Kick agent "${name}"?`)) return;
      try {
        await api(`/agents/${encodeURIComponent(name)}`, { method: 'DELETE' });
        agents = agents.filter(a => a.name !== name);
        renderAgents();
        addSystemMsg(`${name} was kicked`);
      } catch(err) {
        addSystemMsg(`Kick failed: ${err.message}`);
      }
    };
  });
  updateRecipientSelect();
}

function updateRecipientSelect() {
  const sel = document.getElementById('recipient-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Everyone</option>' + agents.map(a =>
    `<option value="${esc(a.name)}">${esc(a.name)}</option>`
  ).join('');
  if (cur) sel.value = cur;
}

// ── Render sidebar threads
function renderThreads() {
  const el = document.getElementById('thread-list');
  const all = [{ name: '(all)', _all: true }, { name: 'general' }, ...threads.filter(t => t.name !== 'general')];
  el.innerHTML = all.map(t => {
    const isActive = t._all ? !currentThread : currentThread === t.name;
    return `<div class="thread-item ${isActive ? 'active' : ''}" data-thread="${t._all ? '' : esc(t.name)}">
      <span class="thread-hash">#</span>${esc(t.name)}
    </div>`;
  }).join('');
  el.querySelectorAll('.thread-item').forEach(item => {
    item.onclick = () => {
      currentThread = item.dataset.thread || null;
      updateThreadHeader();
      renderThreads();
      reloadMessages();
    };
  });
  // Update thread select in compose
  const sel = document.getElementById('thread-select');
  const cur = sel.value;
  const names = ['general', ...threads.filter(t => t.name !== 'general').map(t => t.name)];
  sel.innerHTML = names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
  sel.value = cur || 'general';
}

function updateThreadHeader() {
  document.getElementById('thread-header-name').textContent = currentThread ? `#${currentThread}` : '#all threads';
  document.getElementById('thread-header-meta').textContent = '';
}

// ── Render messages
function buildMsgGroup(msgs, startIdx) {
  // Find consecutive msgs from same sender+recipient
  const first = msgs[startIdx];
  let end = startIdx + 1;
  while (end < msgs.length) {
    const m = msgs[end];
    if (m.sender !== first.sender || (m.recipient || '') !== (first.recipient || '')) break;
    // Only group chat messages
    if (m.msg_type !== 'chat' || first.msg_type !== 'chat') break;
    end++;
  }
  const color = agentColor(first.sender);
  const toTag = first.recipient ? `<span class="msg-to">→ ${esc(first.recipient)}</span>` : '';
  const threadTag = (first.thread && first.thread !== 'general' && !currentThread)
    ? `<span class="msg-thread-tag">#${esc(first.thread)}</span>` : '';

  const bubbles = msgs.slice(startIdx, end).map(m => {
    const typePill = m.msg_type && m.msg_type !== 'chat'
      ? `<span class="type-pill ${m.msg_type}">${m.msg_type}</span>` : '';
    const content = esc(m.content).replace(/@([\w-]+)/g, '<span class="mention">@$1</span>');
    const artifacts = m.artifacts && m.artifacts.length
      ? `<div class="artifacts">${m.artifacts.map(a =>
          `<span class="artifact">${a.type === 'file' ? '📄' : a.type === 'code' ? '💻' : '🔗'} ${esc(a.content.substring(0, 60))}</span>`
        ).join('')}</div>` : '';
    return `<div class="msg-bubble ${m.msg_type !== 'chat' ? m.msg_type : ''}" title="${absTime(m.timestamp)}">
      ${typePill}${content}${artifacts}
    </div>`;
  }).join('');

  return {
    html: `<div class="msg-group">
      <div class="avatar" style="background:${color}22; color:${color}">${esc(initials(first.sender))}</div>
      <div class="msg-group-body">
        <div class="msg-group-header">
          <span class="msg-sender" style="color:${color}">${esc(first.sender)}</span>
          ${toTag} ${threadTag}
          <span class="msg-ts">${relTime(first.timestamp)}</span>
        </div>
        ${bubbles}
      </div>
    </div>`,
    count: end - startIdx,
  };
}

async function reloadMessages() {
  const params = new URLSearchParams({ limit: '100' });
  if (currentThread) params.set('thread', currentThread);
  const msgs = await api('/messages?' + params);
  const el = document.getElementById('messages');
  renderedIds = new Set();
  lastGroupSender = null;
  lastGroupRecipient = null;
  if (!msgs.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">◎</div><p>No messages in ${currentThread ? '#'+currentThread : 'any thread'} yet.</p></div>`;
    return;
  }
  let html = '';
  let i = 0;
  while (i < msgs.length) {
    const group = buildMsgGroup(msgs, i);
    html += group.html;
    for (let j = i; j < i + group.count; j++) renderedIds.add(msgs[j].id);
    i += group.count;
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function appendMessage(m) {
  if (renderedIds.has(m.id)) return;
  if (currentThread && m.thread !== currentThread) return;
  renderedIds.add(m.id);
  const el = document.getElementById('messages');
  // Remove empty state
  const empty = el.querySelector('.empty-state');
  if (empty) empty.remove();
  // Build single-message group
  const group = buildMsgGroup([m], 0);
  el.insertAdjacentHTML('beforeend', group.html);
  el.scrollTop = el.scrollHeight;
}

function addSystemMsg(text) {
  const el = document.getElementById('messages');
  el.insertAdjacentHTML('beforeend', `<div class="system-msg">${esc(text)}</div>`);
  el.scrollTop = el.scrollHeight;
}

// ── Send
async function sendMessage() {
  const ta = document.getElementById('msg-input');
  const content = ta.value.trim();
  if (!content) return;
  const sender = document.getElementById('sender-input').value.trim() || 'dashboard';
  const recipient = document.getElementById('recipient-select').value || null;
  const thread = document.getElementById('thread-select').value || 'general';
  const msg_type = document.getElementById('type-select').value || 'chat';
  try {
    await api('/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sender, content, recipient, thread, msg_type }),
    });
    ta.value = '';
    ta.style.height = 'auto';
  } catch (err) {
    addSystemMsg(`Send failed: ${err.message}`);
  }
}

document.getElementById('send-btn').onclick = sendMessage;

// Auto-resize textarea
const msgTA = document.getElementById('msg-input');
msgTA.addEventListener('input', () => {
  msgTA.style.height = 'auto';
  msgTA.style.height = Math.min(msgTA.scrollHeight, 120) + 'px';
});
msgTA.addEventListener('keydown', e => {
  if (mentionPopup.classList.contains('visible')) {
    if (e.key === 'ArrowDown')  { e.preventDefault(); moveMention(1); return; }
    if (e.key === 'ArrowUp')    { e.preventDefault(); moveMention(-1); return; }
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); selectMention(mentionActiveIndex); return; }
    if (e.key === 'Escape')     { hideMentionPopup(); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
msgTA.addEventListener('input', handleMentionInput);
msgTA.addEventListener('blur', () => setTimeout(hideMentionPopup, 150));

// ── @mention autocomplete
const mentionPopup = document.getElementById('mention-popup');
let mentionActiveIndex = 0;
let mentionFiltered = [];
let mentionStart = -1;

function getMentionQuery() {
  const val = msgTA.value;
  const cursor = msgTA.selectionStart;
  for (let i = cursor - 1; i >= 0; i--) {
    if (val[i] === '@') {
      if (i === 0 || val[i-1] === ' ') { mentionStart = i; return val.substring(i+1, cursor).toLowerCase(); }
      break;
    }
    if (val[i] === ' ') break;
  }
  mentionStart = -1;
  return null;
}

function handleMentionInput() {
  const q = getMentionQuery();
  if (q !== null) showMentionPopup(q);
  else hideMentionPopup();
}

function showMentionPopup(query) {
  const pool = [{ name: 'all', role: 'Broadcast to everyone' }, ...agents];
  mentionFiltered = pool.filter(a => a.name.toLowerCase().includes(query));
  if (!mentionFiltered.length) { hideMentionPopup(); return; }
  mentionActiveIndex = 0;
  mentionPopup.innerHTML = mentionFiltered.map((a, i) => {
    const color = agentColor(a.name);
    return `<div class="mention-option ${i===0?'active':''}" data-idx="${i}">
      <div class="mo-avatar" style="background:${color}22;color:${color}">${esc(initials(a.name))}</div>
      <div><div class="mo-name">@${esc(a.name)}</div><div class="mo-role">${esc(a.role||'')}</div></div>
    </div>`;
  }).join('');
  mentionPopup.classList.add('visible');
  mentionPopup.querySelectorAll('.mention-option').forEach(opt => {
    opt.addEventListener('mousedown', e => { e.preventDefault(); selectMention(+opt.dataset.idx); });
  });
}

function hideMentionPopup() { mentionPopup.classList.remove('visible'); mentionStart = -1; mentionFiltered = []; }

function moveMention(dir) {
  mentionActiveIndex = (mentionActiveIndex + dir + mentionFiltered.length) % mentionFiltered.length;
  mentionPopup.querySelectorAll('.mention-option').forEach((o, i) => o.classList.toggle('active', i === mentionActiveIndex));
}

function selectMention(idx) {
  const selected = mentionFiltered[idx];
  if (!selected) return;
  const val = msgTA.value;
  const before = val.substring(0, mentionStart);
  const after = val.substring(msgTA.selectionStart);
  msgTA.value = before + '@' + selected.name + ' ' + after;
  const pos = mentionStart + selected.name.length + 2;
  msgTA.setSelectionRange(pos, pos);
  const sel = document.getElementById('recipient-select');
  sel.value = selected.name === 'all' ? '' : selected.name;
  hideMentionPopup();
  msgTA.focus();
}

// ── SSE
function connectSSE() {
  const logoDot = document.getElementById('logo-dot');
  const badge = document.getElementById('conn-badge');
  const es = new EventSource(API + '/events' + (TOKEN ? `?token=${encodeURIComponent(TOKEN)}` : ''));

  const setConn = (connected) => {
    badge.textContent = connected ? 'Connected' : 'Reconnecting';
    badge.className = 'conn-badge' + (connected ? '' : ' disconnected');
    logoDot.className = 'logo-dot' + (connected ? '' : ' disconnected');
  };

  es.onopen = () => setConn(true);
  es.onerror = () => {
    setConn(false);
    setTimeout(() => { if (es.readyState === EventSource.CLOSED) connectSSE(); }, 3000);
  };
  es.addEventListener('connected', () => setConn(true));

  es.addEventListener('message', e => {
    const msg = JSON.parse(e.data);
    appendMessage(msg);
  });

  es.addEventListener('agent_joined', e => {
    const a = JSON.parse(e.data);
    const idx = agents.findIndex(x => x.name === a.name);
    if (idx >= 0) agents[idx] = a; else agents.push(a);
    renderAgents();
    addSystemMsg(`${a.name} joined`);
  });

  es.addEventListener('agent_status', e => {
    const a = JSON.parse(e.data);
    const idx = agents.findIndex(x => x.name === a.name);
    if (idx >= 0) agents[idx] = a; else agents.push(a);
    renderAgents();
  });

  es.addEventListener('agent_kicked', e => {
    const a = JSON.parse(e.data);
    agents = agents.filter(x => x.name !== a.name);
    renderAgents();
    addSystemMsg(`${a.name} was kicked`);
  });

  es.addEventListener('thread_created', e => {
    const t = JSON.parse(e.data);
    if (!threads.find(x => x.name === t.name)) threads.push(t);
    renderThreads();
    addSystemMsg(`Thread #${t.name} created`);
  });
}

// ── Resize handles
const root = document.documentElement;

function loadSizes() {
  const sw = localStorage.getItem('ab-sidebar');
  const ch = localStorage.getItem('ab-compose-h');
  const ah = localStorage.getItem('ab-agents-h');
  if (sw) root.style.setProperty('--sidebar', sw + 'px');
  if (ch) root.style.setProperty('--compose-h', ch + 'px');
  if (ah) root.style.setProperty('--agents-h', ah + 'px');
}
loadSizes();

function makeDrag({ handle, onStart, onMove, onEnd, cursor }) {
  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    const startData = onStart(e);
    handle.classList.add('active');
    document.body.classList.add(cursor === 'col-resize' ? 'resizing' : 'resizing-v');
    const move = ev => onMove(ev, startData);
    const up = ev => {
      onMove(ev, startData);
      handle.classList.remove('active');
      document.body.classList.remove('resizing', 'resizing-v');
      if (onEnd) onEnd();
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

// Sidebar width
makeDrag({
  handle: document.getElementById('rz-sidebar'),
  cursor: 'col-resize',
  onStart: e => ({
    x: e.clientX,
    w: parseInt(getComputedStyle(root).getPropertyValue('--sidebar')) || 240,
  }),
  onMove: (e, { x, w }) => {
    const nw = Math.max(160, Math.min(420, w + e.clientX - x));
    root.style.setProperty('--sidebar', nw + 'px');
    localStorage.setItem('ab-sidebar', nw);
  },
});

// Compose height
makeDrag({
  handle: document.getElementById('rz-compose'),
  cursor: 'row-resize',
  onStart: e => ({
    y: e.clientY,
    h: parseInt(getComputedStyle(root).getPropertyValue('--compose-h')) || 110,
  }),
  onMove: (e, { y, h }) => {
    const nh = Math.max(80, Math.min(320, h - (e.clientY - y)));
    root.style.setProperty('--compose-h', nh + 'px');
    localStorage.setItem('ab-compose-h', nh);
  },
});

// Agents/Threads split inside sidebar
makeDrag({
  handle: document.getElementById('rz-sidebar-split'),
  cursor: 'row-resize',
  onStart: e => ({
    y: e.clientY,
    h: parseInt(getComputedStyle(root).getPropertyValue('--agents-h')) || 200,
  }),
  onMove: (e, { y, h }) => {
    const nh = Math.max(80, Math.min(460, h + (e.clientY - y)));
    root.style.setProperty('--agents-h', nh + 'px');
    localStorage.setItem('ab-agents-h', nh);
  },
});

// ── Theme toggle
const themeBtn = document.getElementById('theme-btn');
let currentTheme = localStorage.getItem('ab-theme') || 'dark';

function applyTheme(t) {
  currentTheme = t;
  root.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
  themeBtn.textContent = t === 'light' ? '🌙' : '☀️';
  localStorage.setItem('ab-theme', t);
}
applyTheme(currentTheme);

themeBtn.addEventListener('click', () => {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

// ── Init
(async () => {
  try {
    await Promise.all([
      api('/agents').then(a => { agents = a; renderAgents(); }),
      api('/threads').then(t => { threads = t; renderThreads(); }),
    ]);
    updateThreadHeader();
    await reloadMessages();
    connectSSE();
  } catch (err) {
    document.getElementById('conn-badge').textContent = 'Failed';
    document.getElementById('conn-badge').className = 'conn-badge disconnected';
    addSystemMsg(`Load failed: ${err.message}`);
  }
})();
</script>
