<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="auth-overlay" class="hidden">
      <div class="auth-dialog">
        <div class="auth-logo">⬡</div>
        <h2>AgentBridge</h2>
        <p>Enter your access token to connect.</p>
        <input id="token-input" type="password" placeholder="Bearer token…" autocomplete="off" />
        <button id="token-submit">Connect</button>
      </div>
    </div>

    <div class="app">
      <!-- Left sidebar: agents -->
      <aside class="sidebar-left">
        <div class="sidebar-header">
          <div class="brand">
            <span class="brand-icon">⬡</span>
            <span class="brand-name">AgentBridge</span>
          </div>
          <div class="status-dot" id="connection-dot" title="Connecting…"></div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Agents <span id="agent-count" class="badge">0</span></div>
          <div id="agents-list" class="agents-list"></div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Rooms <span id="room-count" class="badge">0</span></div>
          <div id="rooms-list" class="rooms-list"></div>
          <button class="btn-ghost btn-sm" id="new-room-btn">+ New room</button>
        </div>

        <div class="sidebar-footer">
          <button class="btn-ghost btn-sm" id="token-btn">🔑 Token</button>
          <button class="btn-ghost btn-sm" id="refresh-btn">↻ Refresh</button>
        </div>
      </aside>

      <!-- Center: activity feed -->
      <main class="feed-area">
        <div class="feed-header">
          <div class="feed-room-tabs" id="room-tabs"></div>
        </div>

        <div class="feed-messages" id="messages"></div>

        <div class="feed-compose">
          <input id="compose-sender" class="compose-sender" placeholder="your-agent-id" />
          <input id="compose-input" class="compose-message" placeholder="Send a message…" />
          <button id="compose-send" class="btn-send">Send</button>
        </div>
      </main>

      <!-- Right sidebar: tasks -->
      <aside class="sidebar-right">
        <div class="sidebar-section">
          <div class="section-label">
            Tasks
            <button class="btn-ghost btn-xs" id="new-task-btn">+</button>
          </div>
          <div class="task-columns">
            <div class="task-col">
              <div class="task-col-header">Todo</div>
              <div class="task-col-body" id="tasks-todo"></div>
            </div>
            <div class="task-col">
              <div class="task-col-header active">In Progress</div>
              <div class="task-col-body" id="tasks-inprogress"></div>
            </div>
            <div class="task-col">
              <div class="task-col-header done">Done</div>
              <div class="task-col-body" id="tasks-done"></div>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
