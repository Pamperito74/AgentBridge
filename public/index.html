<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentBridge Control Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">AgentBridge • Paperclip Orchestration</p>
          <h1>Control Room</h1>
          <p class="subtitle">
            A live topology of your AI organization with rooms, routing, and MCP tools.
          </p>
        </div>
        <div class="hero-card">
          <div>
            <span class="label">Status</span>
            <strong id="status-pill">Booting…</strong>
          </div>
          <div>
            <span class="label">Agents</span>
            <strong id="agent-count">0</strong>
          </div>
          <div>
            <span class="label">Rooms</span>
            <strong id="room-count">0</strong>
          </div>
        </div>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <h2>Topology</h2>
            <button id="refresh">Refresh</button>
          </div>
          <svg id="topology" viewBox="0 0 800 480"></svg>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>Rooms</h2>
            <button id="create-room">New Room</button>
          </div>
          <div id="rooms"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>Tools</h2>
            <button id="run-tool">Execute</button>
          </div>
          <div id="tools"></div>
        </article>
      </section>

      <section class="grid">
        <article class="panel wide">
          <div class="panel-header">
            <h2>Room Feed</h2>
            <div class="room-selector">
              <select id="room-select"></select>
              <button id="send-message">Send</button>
            </div>
          </div>
          <div id="messages"></div>
        </article>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
